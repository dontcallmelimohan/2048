<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>极简图片相册</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background: #f8f6f0;
            color: #2c2c2c;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(248, 246, 240, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8e6e0;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            color: #2c2c2c;
        }

        .upload-btn {
            background: #d8ebff;
            color: #007aff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #c6deff;
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .upload-input {
            display: none;
        }

        .gallery {
            padding: 60px 8px 20px 8px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(124px, 1fr));
            gap: 8px;
            max-width: 100%;
        }

        .photo {
            aspect-ratio: 1;
            background: #ffffff;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0ede6;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .photo:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #a8a8a8;
            font-size: 16px;
            padding: 120px 20px;
            font-weight: 400;
        }

        /* 长按效果 */
        .photo.deleting {
            opacity: 0.6;
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                padding: 50px 6px 20px 6px;
                gap: 6px;
            }
        }

        .upload-area {
            display: none;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
</head>

<body>
    <div class="header">
        <h1>相册</h1>
        <button class="upload-btn" onclick="document.getElementById('file').click()">上传</button>
    </div>

    <input type="file" id="file" class="upload-input" accept="image/*" multiple onchange="uploadImage()">

    <div class="gallery" id="gallery"></div>

    <script>
        const SUPABASE_URL = "https://lcbqhraxzadgfnzrcvjw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MdZyOd7UJigomA3xGSd_Ig_gzg5ds5a";
        const BUCKET_NAME = "ohmyphoto";

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = loadImages;

        // 上传图片
        async function uploadImage() {
            const fileInput = document.getElementById('file');
            const files = Array.from(fileInput.files);
            if (files.length === 0) return;

            const uploadBtn = document.querySelector('.upload-btn');
            const originalText = uploadBtn.textContent;
            uploadBtn.textContent = "上传中...";
            uploadBtn.disabled = true;

            let success = 0;
            try {
                for (const file of files) {
                    const name = Date.now() + Math.random() + '.' + file.name.split('.').pop();
                    await supabaseClient.storage.from(BUCKET_NAME).upload(`public/${name}`, file);
                    success++;
                }
                alert(`上传成功：${success} 张`);
                loadImages();
            } catch (e) {
                alert('上传失败');
            } finally {
                uploadBtn.textContent = originalText;
                uploadBtn.disabled = false;
                fileInput.value = '';
            }
        }

        // 加载图片 + 绑定长按删除
        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "<div class='empty-state'>加载中...</div>";

            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list('public/', { limit: 100 });
            if (error) {
                gallery.innerHTML = "<div class='empty-state'>加载失败</div>";
                return;
            }

            gallery.innerHTML = data.length === 0 ? "<div class='empty-state'>暂无图片</div>" : "";

            for (const item of data) {
                if (item.name === '.keep') continue;

                const { data: urlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(`public/${item.name}`);

                const div = document.createElement('div');
                div.className = 'photo';
                div.innerHTML = `<img src="${urlData.publicUrl}" loading="lazy">`;

                // 绑定：长按删除
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    confirmDelete(item.name, div);
                };
                div.ontouchstart = () => {
                    div.timer = setTimeout(() => confirmDelete(item.name, div), 600);
                };
                div.ontouchend = () => clearTimeout(div.timer);

                gallery.appendChild(div);
            }
        }

        // 删除确认
        async function confirmDelete(fileName, element) {
            if (!confirm('确定要删除这张图片吗？')) return;

            element.classList.add('deleting');
            const { error } = await supabaseClient.storage.from(BUCKET_NAME).remove([`public/${fileName}`]);

            if (error) {
                alert('删除失败');
                element.classList.remove('deleting');
            } else {
                element.style.opacity = '0';
                setTimeout(() => loadImages(), 300);
            }
        }
    </script>
</body>

</html>
