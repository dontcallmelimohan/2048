<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>极简图片相册</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background: #f8f6f0;
            color: #2c2c2c;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(248, 246, 240, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8e6e0;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            color: #2c2c2c;
        }

        .upload-btn {
            background: #d8ebff;
            color: rgb(155, 155, 255);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #c6deff;
        }

        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .upload-input {
            display: none;
        }

        .gallery {
            padding: 60px 8px 20px 8px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(124px, 1fr));
            gap: 8px;
            max-width: 100%;
        }

        .photo {
            aspect-ratio: 1;
            background: #ffffff;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0ede6;
        }

        .photo:hover {

            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }


        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #a8a8a8;
            font-size: 16px;
            padding: 120px 20px;
            font-weight: 400;
        }

        .upload-area {
            display: none;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                padding: 50px 6px 20px 6px;
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>相册</h1>
        <button class="upload-btn" onclick="document.getElementById('file').click()">上传</button>
    </div>

    <input type="file" id="file" class="upload-input" accept="image/*" multiple onchange="uploadImage()">

    <!-- 图片展示 -->
    <div class="gallery" id="gallery"></div>

    <script>
        // ====================== 填写你的 Supabase 信息 ======================
        const SUPABASE_URL = "https://lcbqhraxzadgfnzrcvjw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MdZyOd7UJigomA3xGSd_Ig_gzg5ds5a";
        const BUCKET_NAME = "ohmyphoto" // 存储桶名称
        // ===================================================================

        // 初始化 Supabase 客户端
        const { createClient } = supabase
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)

        // 页面加载时加载所有图片
        window.onload = loadImages

        // 上传图片
        async function uploadImage() {
            const fileInput = document.getElementById('file')
            const files = Array.from(fileInput.files)

            if (files.length === 0) {
                alert("请选择图片")
                return
            }

            // 获取上传按钮并禁用它
            const uploadBtn = document.querySelector('.upload-btn')
            const originalText = uploadBtn.textContent
            uploadBtn.textContent = "上传中..."
            uploadBtn.disabled = true

            let successCount = 0
            let failCount = 0

            try {
                for (const file of files) {
                    try {
                        // 生成安全的文件名：时间戳 + 随机数 + 扩展名
                        const timestamp = Date.now() + Math.random()
                        const extension = file.name.split('.').pop().toLowerCase()
                        const safeFileName = `${timestamp}.${extension}`

                        console.log("上传文件:", file.name, "->", safeFileName)

                        // 上传到 Supabase Storage
                        const { data, error } = await supabaseClient.storage
                            .from(BUCKET_NAME)
                            .upload(`public/${safeFileName}`, file)

                        if (error) {
                            console.error("上传失败:", error)
                            failCount++
                        } else {
                            console.log("上传成功:", safeFileName)
                            successCount++
                        }
                    } catch (fileError) {
                        console.error("文件上传异常:", fileError)
                        failCount++
                    }
                }

                // 显示结果
                if (successCount > 0) {
                    alert(`✅ 上传完成！成功: ${successCount} 个${failCount > 0 ? `, 失败: ${failCount} 个` : ''}`)
                    fileInput.value = ""
                    loadImages()
                } else {
                    alert("❌ 所有文件上传失败")
                }

            } catch (error) {
                alert("❌ 上传异常: " + error.message)
                console.error("上传异常:", error)
            } finally {
                // 恢复按钮状态
                uploadBtn.textContent = originalText
                uploadBtn.disabled = false
            }
        }

        // 加载并展示所有图片
        async function loadImages() {
            const gallery = document.getElementById('gallery')
            gallery.innerHTML = "<div class='empty-state'>加载中...</div>"

            try {
                const { data, error } = await supabaseClient.storage
                    .from(BUCKET_NAME)
                    .list('public/', { limit: 100 })

                if (error) {
                    throw new Error(error.message)
                }

                gallery.innerHTML = ""

                if (!data || data.length === 0) {
                    gallery.innerHTML = "<div class='empty-state'>暂无图片</div>"
                    return
                }

                for (const item of data) {
                    if (item.name === '.keep') continue

                    const { data: urlData } = supabaseClient.storage
                        .from(BUCKET_NAME)
                        .getPublicUrl(`public/${item.name}`)

                    const img = document.createElement('div')
                    img.className = "photo"
                    img.innerHTML = `<img src="${urlData.publicUrl}" alt="照片" loading="lazy">`
                    gallery.appendChild(img)
                }
            } catch (error) {
                gallery.innerHTML = "<div class='empty-state'>❌ 加载图片失败</div>"
                console.error("加载图片错误:", error)
            }
        }
    </script>
</body>

</html>
