<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>震动按钮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
            padding: 20px;
        }

        .vibrate-btn {
            width: 100%;
            max-width: 320px;
            padding: 24px 40px;
            font-size: 19px;
            font-weight: 600;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
            transition: all 0.18s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        .vibrate-btn:active {
            transform: scale(0.94);
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.15);
            background: #0066cc;
        }
    </style>
</head>

<body>

    <button class="vibrate-btn" onclick="vibrateAndClick()">
        点我有震动反馈
    </button>

    <script>
        function vibrateAndClick() {
            // 更强更清晰的震动（手机必震）
            if (navigator.vibrate) {
                navigator.vibrate([10, 20, 10]); // 短震动组合，手感最强
            }
        }
    </script>

</body>

</html>
