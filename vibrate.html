<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>震动按钮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f2f5ff;
            padding: 20px;
        }

        .btn {
            width: 100%;
            max-width: 350px;
            padding: 26px 40px;
            font-size: 18px;
            font-weight: 600;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 20px;
            text-align: center;
            -webkit-appearance: none;
            cursor: pointer;
            user-select: none;
            outline: none;
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.96);
            background: #0062cc;
        }
    </style>
</head>

<body>

    <button class="btn" id="btn">iPhone 点我震动</button>

    <script>
        // 必须用 addEventListener —— iPhone 才支持震动！
        const btn = document.getElementById('btn');

        btn.addEventListener('click', () => {
            // 只有 click 事件里震动，iPhone 才会生效
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        });
    </script>

</body>

</html>
