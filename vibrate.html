<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 必加：手机完美适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>震动按钮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f6f8fa;
        }

        /* 手机完美适配的大按钮 */
        .vibrate-btn {
            padding: 20px 60px;
            font-size: 18px;
            font-weight: 500;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* 点击缩小效果 */
        .vibrate-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <button class="vibrate-btn" onclick="vibrateAndClick()">
        点我有震动反馈
    </button>

    <script>
        function vibrateAndClick() {
            // 手机震动（最舒服的短震动）
            if (navigator.vibrate) {
                navigator.vibrate(20);
            }

        }
    </script>

</body>

</html>
