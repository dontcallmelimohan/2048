<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体重记录</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 300;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: -0.5px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 60px;
        }

        input {
            width: 200px;
            padding: 16px 20px;
            font-size: 20px;
            text-align: center;
            border: none;
            border-bottom: 2px solid #333;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }

        input::placeholder {
            color: #999;
        }

        input:focus {
            border-bottom-color: #000;
        }

        button {
            padding: 12px 40px;
            font-size: 14px;
            letter-spacing: 0.5px;
            border: 1px solid #333;
            background: transparent;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #333;
            color: white;
        }

        #message {
            min-height: 20px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .chart-container {
            margin-top: 80px;
        }

        canvas {
            display: block;
        }

        .reset-option {
            margin-top: 100px;
            text-align: center;
            font-size: 11px;
        }

        .reset-link {
            color: #999;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s;
        }

        .reset-link:hover {
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Weight</h1>

        <div class="input-section">
            <input type="number" id="weight" placeholder="输入体重" step="0.1">
            <button onclick="saveWeight()">提交</button>
            <div id="message"></div>
        </div>

        <div class="chart-container">
            <canvas id="weightChart"></canvas>
        </div>

        <div class="reset-option">
            <a class="reset-link" onclick="resetData()" title="删除所有体重数据并重新开始">重新开始</a>
        </div>
    </div>

    <script>
        // 配置信息
        const SUPABASE_URL = "https://lcbqhraxzadgfnzrcvjw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MdZyOd7UJigomA3xGSd_Ig_gzg5ds5a";

        // 创建 Supabase 客户端
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let weightChart = null;

        // 获取体重数据
        async function fetchWeightData() {
            try {
                const { data, error } = await sb
                    .from("weights")
                    .select("weight, created_at")
                    .order("created_at", { ascending: true });

                if (error) throw error;
                return data || [];
            } catch (err) {
                console.error("获取数据失败:", err);
                showMessage("获取数据失败", "error");
                return [];
            }
        }

        // 绘制折线图
        async function drawWeightChart() {
            const data = await fetchWeightData();

            if (data.length === 0) return;

            const labels = data.map(item => {
                const date = new Date(item.created_at);
                return date.toLocaleDateString('zh-CN');
            });

            const weights = data.map(item => item.weight);

            if (weightChart) weightChart.destroy();

            const ctx = document.getElementById('weightChart').getContext('2d');
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '体重 (kg)',
                        data: weights,
                        borderColor: '#333',
                        backgroundColor: 'rgba(0, 0, 0, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#333',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            display: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // 显示消息
        function showMessage(text, type = '') {
            const messageEl = document.getElementById("message");
            messageEl.textContent = text;
            messageEl.className = type;

            setTimeout(() => {
                messageEl.textContent = '';
                messageEl.className = '';
            }, 3000);
        }

        // 保存体重
        async function saveWeight() {
            const val = document.getElementById("weight").value.trim();
            if (!val) {
                showMessage("请输入体重", "error");
                return;
            }

            try {
                const { error } = await sb
                    .from("weights")
                    .insert([{ weight: parseFloat(val) }]);

                if (error) throw error;

                showMessage("保存成功", "success");
                document.getElementById("weight").value = "";
                drawWeightChart();
            } catch (err) {
                showMessage("错误: " + err.message, "error");
            }
        }

        // 重置所有数据
        async function resetData() {
            if (!confirm("确定要删除所有体重数据吗？此操作无法撤销。")) {
                return;
            }

            try {
                const { error } = await sb
                    .from("weights")
                    .delete()
                    .gte("id", 0);

                if (error) throw error;

                showMessage("数据已清空，已重新开始", "success");
                document.getElementById("weight").value = "";

                // 清空图表
                if (weightChart) weightChart.destroy();
                const ctx = document.getElementById('weightChart');
                ctx.classList.add('hidden');
            } catch (err) {
                showMessage("删除失败: " + err.message, "error");
            }
        }

        // 页面加载时初始化图表
        window.addEventListener('load', () => {
            drawWeightChart();

            // 添加回车键监听
            document.getElementById("weight").addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    saveWeight();
                }
            });
        });
    </script>
</body>

</html>
