<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体重记录</title>
    <!-- 只引入 Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 全局：页面居中 + 空白 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        /* 唯一的输入框 */
        #weight {
            font-size: 28px;
            padding: 16px 24px;
            width: 280px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 12px;
            outline: none;
        }
    </style>
</head>

<body>
    <!-- 页面上唯一的东西：输入框 -->
    <input type="number" id="weight" placeholder="输入体重" step="0.1">

    <script>
        // ====================== 你只需要改这 2 个东西 ======================
        const SUPABASE_URL = "https://lcbqhraxzadgfnzrcvjw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MdZyOd7UJigomA3xGSd_Ig_gzg5ds5a";
        // ==================================================================

        // 创建数据库连接
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log("✅ Supabase 连接成功");
        } catch (error) {
            console.error("❌ Supabase 连接失败:", error);
            alert("连接失败，请检查网络或重新刷新页面");
        }

        // 输入完按回车 → 保存
        const weightInput = document.getElementById("weight");
        console.log("输入框元素:", weightInput);

        if (weightInput) {
            weightInput.addEventListener("keydown", async (e) => {
                console.log("按键:", e.key);
                if (e.key === "Enter") {
                    const val = e.target.value.trim();
                    console.log("输入的值:", val);
                    if (!val) {
                        console.log("值为空，返回");
                        return;
                    }

                    try {
                        // 插入数据库
                        const { data, error } = await supabase
                            .from("weights") // 表名必须叫 weights
                            .insert([
                                {
                                    weight: parseFloat(val),
                                    created_at: new Date().toISOString()
                                }
                            ]);

                        if (error) {
                            console.error("数据库错误:", error);
                            alert("保存失败: " + error.message);
                        } else {
                            console.log("✅ 数据保存成功:", data);
                            // 保存后清空输入框
                            e.target.value = "";
                            alert("保存成功 ✅");
                        }
                    } catch (e) {
                        console.error("异常:", e);
                        alert("发生错误: " + e.message);
                    }
                }
            });
        } else {
            console.error("找不到输入框元素");
        }
    </script>
</body>
