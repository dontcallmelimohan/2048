<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>iOS Haptic Drum Pad (2026)</title>
    <style>
        :root {
            /* 1. 2026玻璃拟态色系：高透、高亮 */
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --pad-active: rgba(255, 255, 255, 0.25);
            --ios-blue: #007AFF;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 背景使用鲜艳的灵魂渐变，突出玻璃透光感 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
            /* 防止滚屏 */
        }

        /* 2. 打击垫容器 */
        .pad-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* 3x2网格 */
            gap: 20px;
            padding: 30px;

            /* 核心：玻璃拟态主体 */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);

            border-radius: 35px;
            /* iOS超大圆角 */
            border: 0.5px solid var(--glass-border);
            /* 极细边框 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        /* 3. 单个打击垫 */
        .drum-pad {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;

            /* 零延迟反馈的关键 CSS */
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            /* 彻底禁用所有浏览器手势 */

            /* 柔和的过渡动画 */
            transition: all 0.05s ease-out;
        }

        /* 4. 打击垫按下时的视觉反馈（模拟物理阻尼） */
        .drum-pad.active {
            background: var(--pad-active);
            transform: scale(0.92);
            /* 按钮下陷感 */
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .pad-note {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .pad-type {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 底部的提示信息 */
        .info-tip {
            position: fixed;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="pad-container">
        <div class="drum-pad" data-sound="kick" id="pad1">
            <div class="pad-note">A</div>
            <div class="pad-type">KICK</div>
        </div>
        <div class="drum-pad" data-sound="tom" id="pad2">
            <div class="pad-note">B</div>
            <div class="pad-type">TOM</div>
        </div>
        <div class="drum-pad" data-sound="snare" id="pad3">
            <div class="pad-note">C</div>
            <div class="pad-type">SNARE</div>
        </div>
        <div class="drum-pad" data-sound="hihat-closed" id="pad4">
            <div class="pad-note">D</div>
            <div class="pad-type">H-HAT C</div>
        </div>
        <div class="drum-pad" data-sound="hihat-open" id="pad5">
            <div class="pad-note">E</div>
            <div class="pad-type">H-HAT O</div>
        </div>
        <div class="drum-pad" data-sound="click" id="pad6">
            <div class="pad-note">F</div>
            <div class="pad-type">CLICK</div>
        </div>
    </div>

    <div class="info-tip">🔊 请关闭静音模式 | 建议在iOS Safari中体验</div>

    <script>
        // --- 1. 初始化 Web Audio 音频上下文 (核心：iOS兼容性) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                // 兼容性写法，优先使用标准AudioContext
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // iOS核心限制：如果上下文已挂起，必须由用户交互resume()
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // --- 2. 核心：动态生成真实打击乐声音波形 ---
        const SoundEngine = {
            // A. 底鼓 (Kick): 低频、快速衰减
            kick() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                // 初始频率150Hz，在0.1s内滑落至1Hz，制造打击瞬间的沉闷感
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + 0.1);
                // 音量快速衰减
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            // B. 军鼓 (Snare): 高频噪波混合
            snare() {
                // 1. 噪声部分 (White Noise)
                const bufferSize = audioCtx.sampleRate * 0.1; // 0.1秒噪声
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1; // 生成白噪声
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(1, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                // 2. 混合低频震动部分
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                // 3. 混合并输出
                const snareGain = audioCtx.createGain();
                snareGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                noise.connect(noiseGain);
                noiseGain.connect(snareGain);
                osc.connect(snareGain);
                snareGain.connect(audioCtx.destination);
                noise.start();
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            },
            // C. 闭合镲 (Hi-Hat Closed): 高频、极短的噪波
            'hihat-closed'() {
                const bufferSize = audioCtx.sampleRate * 0.02; // 极短，仅0.02秒
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                // 快速消失
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start();
            },
            // F. 伪触感点击 (Click): 低频 Sine，模拟物理开关声
            click() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(160, audioCtx.currentTime); // 沉闷低频
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        };

        // --- 3. 交互逻辑：彻底消除iOS Safari点击延迟 ---
        const pads = document.querySelectorAll('.drum-pad');

        pads.forEach(pad => {
            // 核心：使用 touchstart 代替 click，实现零延迟
            pad.addEventListener('touchstart', (e) => {
                e.preventDefault(); // 阻止默认的缩放、滚动行为

                // 第一次交互时初始化音频上下文
                initAudio();

                if (audioCtx) {
                    // 获取音频类型并播放
                    const soundType = pad.getAttribute('data-sound');
                    if (SoundEngine[soundType]) {
                        SoundEngine[soundType]();
                    } else {
                        // 如果未定义复杂声音，则默认播放伪触感点击声
                        SoundEngine.click();
                    }

                    // 添加按下时的视觉反馈 (active 类)
                    pad.classList.add('active');
                }
            });

            // 松开手指时，移除视觉反馈
            pad.addEventListener('touchend', () => {
                pad.classList.remove('active');
            });

            // 如果手指划出按钮范围，也移除视觉反馈
            pad.addEventListener('touchcancel', () => {
                pad.classList.remove('active');
            });
        });
    </script>
</body>

</html>
