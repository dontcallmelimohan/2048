<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>超炫陀螺仪3D玻璃光影</title>
    <style>
        :root {
            --gx: 50%;
            --gy: 50%;
            --rx: 0deg;
            --ry: 0deg;
            /* 新增：发光强度变量 */
            --glow: 0px;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #050510;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            perspective: 800px;
            /* 增强3D纵深感 */
            background: radial-gradient(circle at center, #101020 0%, #000 70%);
        }

        #auth-btn {
            position: fixed;
            top: 20px;
            z-index: 100;
            background: rgba(100, 120, 255, 0.2);
            color: white;
            border: 1px solid rgba(120, 150, 255, 0.3);
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(100, 120, 255, 0.2);
        }

        #auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(100, 120, 255, 0.4);
        }

        #auth-btn:active {
            transform: scale(0.95);
        }

        .stage {
            transform: rotateX(var(--rx)) rotateY(var(--ry));
            transition: transform 0.12s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* 更丝滑的物理动画 */
        }

        .glass-card {
            width: 320px;
            height: 220px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;

            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px) saturate(250%);
            -webkit-backdrop-filter: blur(30px) saturate(250%);

            border: 1px solid rgba(255, 255, 255, 0.2);
            /* 增强边框 */
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.3),
                0 0 30px var(--glow);
            /* 动态彩色外发光 */

            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 1);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            touch-action: none;
        }

        /* 第一层：强高光 */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle at var(--gx) var(--gy),
                    rgba(255, 255, 255, 0.35) 0%,
                    /* 更亮 */
                    transparent 35%);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        /* 第二层：彩色环境光 */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--gx) var(--gy),
                    rgba(120, 180, 255, 0.15) 0%,
                    transparent 50%);
            pointer-events: none;
            opacity: 0.8;
        }

        .status {
            position: fixed;
            bottom: 30px;
            color: rgba(120, 160, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(120, 160, 255, 0.3);
        }
    </style>
</head>

<body>
    <button id="auth-btn">开启 3D 炫光体验</button>
    <div class="stage">
        <div class="glass-card">3D GYRO</div>
    </div>
    <div class="status" id="log">GYRO: INACTIVE</div>

    <script>
        const authBtn = document.getElementById('auth-btn');
        const root = document.documentElement;
        const log = document.getElementById('log');

        authBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startTracking();
                        authBtn.style.display = 'none';
                    } else {
                        alert('请允许陀螺仪权限');
                    }
                } catch (err) {
                    alert('仅支持HTTPS环境 / 手机浏览器');
                }
            } else {
                startTracking();
                authBtn.style.display = 'none';
            }
        });

        function startTracking() {
            window.addEventListener('deviceorientation', (e) => {
                let beta = e.beta;
                let gamma = e.gamma;

                if (beta === null || gamma === null) return;

                // 扩大活动角度，更夸张
                let cleanBeta = Math.min(Math.max(beta, -45), 45);
                let cleanGamma = Math.min(Math.max(gamma, -45), 45);

                // 高光移动更快更明显
                const gx = 50 + (cleanGamma * 2.2);
                const gy = 50 + (cleanBeta * 2.2);

                // 3D旋转幅度大幅增强
                const rotateX = -cleanBeta * 0.8;
                const rotateY = cleanGamma * 0.8;

                // 动态彩色外发光（倾斜越厉害，光越强）
                const glowIntensity = Math.sqrt(cleanBeta ** 2 + cleanGamma ** 2) * 2;
                const glowColor = `rgba(100, 150, 255, ${glowIntensity / 200})`;

                // 更新所有变量
                root.style.setProperty('--gx', `${gx}%`);
                root.style.setProperty('--gy', `${gy}%`);
                root.style.setProperty('--rx', `${rotateX}deg`);
                root.style.setProperty('--ry', `${rotateY}deg`);
                root.style.setProperty('--glow', `${glowIntensity}px ${glowColor}`);

                log.innerText = `✨ GYRO ACTIVE | B:${Math.round(beta)} G:${Math.round(gamma)}`;
            });
        }
    </script>
</body>

</html>
